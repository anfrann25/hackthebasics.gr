<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>🔒 HackTheBasics.gr - Learning Path</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
</head>
<body>
  <div id="app">Φόρτωση μαθήματος...</div>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>

  <script>
    const githubUser = "anfrann25";
    const githubRepo = "hackthebasics.gr";

    window.$docsify = {
      name: '🔒 HackTheBasics.gr',
      basePath: `https://raw.githubusercontent.com/${githubUser}/${githubRepo}/main/`,
      loadSidebar: true,
      auto2top: true,

      // Plugins του Docsify
      plugins: [
        function(hook, vm) {
          // Αυτό το hook τρέχει ΚΑΘΕ ΦΟΡΑ πριν αλλάξει σελίδα ο χρήστης
          hook.beforeEach(function(html, next) {
            // Παίρνουμε το path της σελίδας που πάει να ανοίξει (π.ε. /01-Networking/DNS)
            const route = vm.route.path;

            // 1. Έλεγχος για την ενότητα 01-Networking
            if (route.includes('/01-Networking/')) {
              if (!localStorage.getItem('quiz_00-Introduction_passed')) {
                alert("🔒 Η ενότητα '01-Networking' είναι κλειδωμένη! Πρέπει πρώτα να περάσεις το Quiz στο τέλος της Εισαγωγής (00-Introduction).");
                window.location.hash = '#/'; // Τον γυρνάει στην αρχική σελίδα
                return;
              }
            }

            // 2. Έλεγχος για την ενότητα 02-Linux
            if (route.includes('/02-Linux/')) {
              if (!localStorage.getItem('quiz_01-Networking_passed')) {
                alert("🔒 Η ενότητα '02-Linux' είναι κλειδωμένη! Πρέπει πρώτα να ολοκληρώσεις το Quiz στο τέλος των Δικτύων (01-Networking).");
                window.location.hash = '#/01-Networking/README'; // Τον γυρνάει στα δίκτυα
                return;
              }
            }

            // 3. Έλεγχος για την ενότητα 03-Virtual-Lab
            if (route.includes('/03-Virtual-Lab/')) {
              if (!localStorage.getItem('quiz_02-Linux_passed')) {
                alert("🔒 Η ενότητα '03-Virtual-Lab' είναι κλειδωμένη! Πρέπει πρώτα να περάσεις το Quiz του Linux.");
                window.location.hash = '#/02-Linux/README';
                return;
              }
            }

            // Αν όλα είναι οκ, προχωράει κανονικά στο μάθημα
            next(html);
          });
        }
      ]
    }
  </script>
</body>
</html>
