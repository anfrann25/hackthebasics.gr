<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>HackTheBasics.gr - Learning Path</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Dark Theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify/themes/dark.css">

  <!-- Practical CSS -->
  <style>
    body { font-family: 'Inter', sans-serif; }

    .sidebar {
      position: fixed;
      top: 0;
      bottom: 0;
      overflow-y: auto;
    }

    .markdown-section {
      max-width: 850px;
      margin: auto;
      padding: 40px;
      line-height: 1.6;
      font-size: 16px;
    }

    pre code {
      font-size: 14px;
      padding: 12px;
      border-radius: 6px;
    }

    .search input {
      border-radius: 6px;
      padding: 8px 12px;
    }
  </style>
</head>

<body>
  <div id="app">Φόρτωση μαθήματος...</div>

  <script>
    const githubUser = "anfrann25";
    const githubRepo = "hackthebasics.gr";

    window.$docsify = {
      name: 'HackTheBasics.gr',
      logo: 'src/logo.svg',
      basePath: `https://raw.githubusercontent.com/${githubUser}/${githubRepo}/main/`,
      loadSidebar: true,
      auto2top: true,
      autoHeader: false,
      search: 'auto',
      breadcrumb: { show: true }
    }
  </script>

  <!-- Docsify -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>

  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-breadcrumb/dist/docsify-breadcrumb.min.js"></script>
</body>
</html>
