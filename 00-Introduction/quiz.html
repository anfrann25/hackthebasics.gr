<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background-color: #0d1117; /* Ίδιο dark background με το Docsify */
      color: #c9d1d9;
      margin: 0;
      padding: 20px;
    }
    .quiz-container {
      background: #161b22;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #30363d;
    }
    .question { margin-bottom: 20px; }
    .question p { font-weight: bold; margin-bottom: 8px; }
    label { display: block; margin-bottom: 6px; cursor: pointer; }
    button {
      padding: 10px 20px;
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #f0f6fc1f;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #30363d; }
    #netQuizResult { margin-top: 15px; font-weight: bold; font-size: 1.1rem; }
  </style>
</head>
<body>

<div class="quiz-container">
    <h3>📝 Quiz Ενότητας: 01-Networking</h3>
    <p style="color: #8b949e;">Απάντησε σωστά στο 70% για να ξεκλειδώσεις το Linux!</p>
    <hr style="border-color: #30363d; margin: 15px 0;">

    <div class="question">
        <p>1. Ποιο πρωτόκολλο είναι ασφαλές;</p>
        <label><input type="radio" name="net_q1" value="wrong"> HTTP</label>
        <label><input type="radio" name="net_q1" value="correct"> HTTPS</label>
    </div>

    <div class="question">
        <p>2. Σε ποιο layer του OSI ανήκει το IP routing;</p>
        <label><input type="radio" name="net_q2" value="correct"> Network Layer (Layer 3)</label>
        <label><input type="radio" name="net_q2" value="wrong"> Data Link Layer (Layer 2)</label>
    </div>

    <div class="question">
        <p>3. Τι κάνει το DNS;</p>
        <label><input type="radio" name="net_q3" value="correct"> Μετατρέπει ονόματα σε IP</label>
        <label><input type="radio" name="net_q3" value="wrong"> Κρυπτογραφεί αρχεία</label>
    </div>

    <button onclick="checkSectionQuiz()">Υποβολή Απαντήσεων</button>
    <p id="netQuizResult"></p>
</div>

<script>
function checkSectionQuiz() {
    let score = 0;
    if(document.querySelector('input[name="net_q1"]:checked')?.value === 'correct') score++;
    if(document.querySelector('input[name="net_q2"]:checked')?.value === 'correct') score++;
    if(document.querySelector('input[name="net_q3"]:checked')?.value === 'correct') score++;

    const pct = (score / 3) * 100;
    const res = document.getElementById('netQuizResult');

    if (pct >= 70) {
        res.style.color = "#4caf50";
        res.innerHTML = `🎉 Μπράβο! Πέρασες με ${pct.toFixed(0)}%. Η επόμενη ενότητα ξεκλειδώθηκε!`;
        
        // Αποθήκευση στο localStorage της κεντρικής σελίδας
        parent.localStorage.setItem('quiz_01    -Networking_passed', 'true');
        
        // Αυτόματη μεταφορά στο Linux μετά από 1.5 δευτερόλεπτο
        setTimeout(() => {
            parent.window.location.hash = '#/02-Linux/README';
        }, 1500);
    } else {
        res.style.color = "#f44336";
        res.innerHTML = `❌ Σκορ: ${pct.toFixed(0)}%. Χρειάζεσαι τουλάχιστον 70% για να συνεχίσεις.`;
    }
}
</script>

</body>
</html>
